<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Delhi//PadelCollective</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

  /* ── VIDEO BACKGROUND ── */
  .video-wrap { position: fixed; inset: 0; z-index: 0; }
  .video-wrap video { width: 100%; height: 100%; object-fit: cover; object-position: center; }

  /* Cinematic overlay — dark top + bottom, clear middle */
  .overlay {
    position: fixed; inset: 0; z-index: 1;
    background: linear-gradient(to bottom,
      rgba(0,0,0,.75) 0%,
      rgba(0,0,0,.20) 35%,
      rgba(0,0,0,.20) 60%,
      rgba(0,0,0,.82) 100%
    );
  }

  /* ── PAGE ── */
  .page {
    position: relative; z-index: 10;
    width: 100%; height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: space-between;
    padding: 36px 40px 52px;
  }

  /* ── LOGO ── */
  nav { width: 100%; display: flex; align-items: center; justify-content: center; }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 14px; font-weight: 700;
    color: rgba(255,255,255,.85);
    letter-spacing: 3px; text-transform: uppercase;
  }
  .logo .sl { color: rgba(255,255,255,.3); font-weight: 300; }

  /* ── HERO ── */
  .hero {
    display: flex; flex-direction: column;
    align-items: center; text-align: center;
    animation: fadeUp .9s ease both;
    animation-delay: .2s;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hero-eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 10px; font-weight: 500;
    letter-spacing: 4px; text-transform: uppercase;
    color: rgba(255,255,255,.35);
    margin-bottom: 22px;
  }

  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(76px, 13vw, 148px);
    font-weight: 300; font-style: italic;
    line-height: .9; color: #fff;
    letter-spacing: -3px;
    text-shadow: 0 4px 60px rgba(0,0,0,.6);
  }
  .hero-sub {
    font-family: 'Playfair Display', serif;
    font-size: clamp(13px, 1.5vw, 17px);
    font-weight: 400; font-style: normal;
    letter-spacing: 7px; text-transform: uppercase;
    color: rgba(255,255,255,.55);
    margin-top: 14px;
  }

  /* ── CTAs ── */
  .ctas {
    display: flex; gap: 10px;
    flex-wrap: wrap; justify-content: center;
    animation: fadeUp .9s ease both;
    animation-delay: .45s;
  }

  .cta {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 30px; border-radius: 100px;
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 500; letter-spacing: .3px;
    text-decoration: none; cursor: pointer;
    transition: all .22s ease; white-space: nowrap; border: none;
  }

  /* Apply to Join — frosted glass */
  .cta-primary {
    background: rgba(255,255,255,.1);
    color: #fff;
    border: 1.5px solid rgba(255,255,255,.38);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }
  .cta-primary:hover {
    background: rgba(255,255,255,.2);
    border-color: rgba(255,255,255,.65);
    transform: scale(1.04);
  }

  /* Monthly Calendar — sage green accent */
  .cta-green {
    background: #b8dbb0;
    color: #162912;
    border: 1.5px solid #b8dbb0;
    font-weight: 600;
  }
  .cta-green:hover {
    background: #cae8c1;
    transform: scale(1.04);
    box-shadow: 0 6px 28px rgba(140,200,120,.4);
  }

  /* Leaderboard — ghost */
  .cta-ghost {
    background: transparent;
    color: rgba(255,255,255,.65);
    border: 1.5px solid rgba(255,255,255,.22);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .cta-ghost:hover {
    background: rgba(255,255,255,.07);
    color: #fff;
    border-color: rgba(255,255,255,.45);
    transform: scale(1.04);
  }

  /* ── BOTTOM ── */
  .tagline {
    font-family: 'Inter', sans-serif;
    font-size: 10px; font-weight: 400;
    letter-spacing: 3px; text-transform: uppercase;
    color: rgba(255,255,255,.2);
    animation: fadeUp .9s ease both;
    animation-delay: .65s;
  }

  /* Fallback bg if no video */
  .video-fallback {
    position: fixed; inset: 0;
    background: linear-gradient(140deg, #0c0c0c 0%, #1c1c1c 60%, #0a0a0a 100%);
    z-index: -1;
  }

  @media (max-width: 600px) {
    .page { padding: 28px 20px 40px; }
    .hero-title { font-size: 72px; letter-spacing: -2px; }
    .ctas { gap: 8px; }
    .cta { padding: 12px 22px; font-size: 12px; }
  }
</style>
</head>
<body>

<!--
  ╔══════════════════════════════════════════════════╗
  ║  HOW TO ADD YOUR VIDEO                           ║
  ║  1. Put your video file in this same folder      ║
  ║  2. Rename it to  padel.mp4  (or update src=)   ║
  ║  3. Best: 3–8 sec loop, close-up, landscape      ║
  ╚══════════════════════════════════════════════════╝
-->
<div class="video-wrap">
  <video autoplay muted loop playsinline id="bgVideo">
    <source src="padel.mp4" type="video/mp4"/>
  </video>
</div>
<div class="overlay"></div>
<div class="video-fallback"></div>

<div class="page">

  <!-- LOGO TOP -->
  <nav>
    <div class="logo">Delhi<span class="sl">&nbsp;//&nbsp;</span>PadelCollective</div>
  </nav>

  <!-- CENTRE TITLE -->
  <div class="hero">
    <div class="hero-eyebrow">New Delhi &nbsp;·&nbsp; India</div>
    <div class="hero-title">Padel</div>
    <div class="hero-sub">Collective</div>
  </div>

  <!-- 3 CTAs -->
  <div class="ctas">
    <a class="cta cta-primary" href="#" id="applyBtn">Apply to Join</a>
    <a class="cta cta-green"   href="https://dpc-padel.github.io/Calender/">Monthly Calendar</a>
    <a class="cta cta-ghost"   href="https://dpc-padel.github.io/Ranking/">Leaderboard</a>
  </div>

  <!-- BOTTOM -->
  <div class="tagline">Wanna play padel? &nbsp;Start here.</div>

</div>

<script>
  // Hide video wrap if no video file found
  const vid = document.getElementById("bgVideo");
  vid.addEventListener("error", () => {
    document.querySelector(".video-wrap").style.display = "none";
  });

  // Apply to Join — backend coming soon
  document.getElementById("applyBtn").addEventListener("click", e => {
    e.preventDefault();
    alert("Applications opening soon!\nFollow @delhipadelcollective on Instagram for updates.");
  });
</script>
</body>
</html>
